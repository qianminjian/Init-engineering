_min_ae_version: "0.1.0"
_exclude_callback: "auto_engineering.init._shared.exclude:default_match_exclude"
hook_name:
  type: str
  help: Hook 名称
  default: my-hook
hook_description:
  type: str
  help: Hook 描述
  default: ""
hook_type:
  type: choice
  help: Hook 类型
  choices: [PreToolUse, PostToolUse]
  default: PreToolUse
