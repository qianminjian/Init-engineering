_min_ae_version: "0.1.0"
_exclude_callback: "auto_engineering.init._shared.exclude:default_match_exclude"
server_name:
  type: str
  help: MCP Server 名称
  default: my-mcp-server
server_description:
  type: str
  help: Server 描述
  default: ""
language:
  type: choice
  help: 语言
  choices:
    typescript: TypeScript/Node
    python: Python
  default: typescript
transport:
  type: choice
  help: 传输协议
  choices: [stdio, sse, streamable-http]
  default: stdio
