_min_ae_version: "0.1.0"
_exclude_callback: "auto_engineering.init._shared.exclude:default_match_exclude"
repo_name:
  type: str
  help: Monorepo 名称
  default: my-monorepo
repo_description:
  type: str
  help: 仓库描述
  default: ""
package_manager:
  type: choice
  help: 包管理器
  choices: [pnpm, yarn, npm, bun]
  default: pnpm
ci_platform:
  type: choice
  help: CI 平台
  choices: [github, gitlab, none]
  default: github
