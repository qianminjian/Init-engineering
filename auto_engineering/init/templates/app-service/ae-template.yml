_min_ae_version: "0.1.0"
_exclude_callback: "auto_engineering.init._shared.exclude:default_match_exclude"
project_name:
  type: str
  help: 项目名称
  default: my-app
project_description:
  type: str
  help: 项目描述
  default: ""
language:
  type: choice
  help: 主要语言
  choices:
    typescript: TypeScript/Node
    python: Python
  default: typescript
package_manager:
  type: choice
  help: 包管理器
  choices: [npm, pnpm, yarn, bun, uv, poetry]
  default: pnpm
test_runner:
  type: choice
  help: 测试框架
  choices: [vitest, jest, pytest]
  default: vitest
  when: "{{ language != 'none' }}"
use_typescript:
  type: bool
  help: 使用 TypeScript
  default: true
ci_platform:
  type: choice
  help: CI 平台
  choices: [github, gitlab, none]
  default: github
