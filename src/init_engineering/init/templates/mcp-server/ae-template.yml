_min_ae_version: "1.0.0"
_exclude_callback: "init_engineering.init._shared.exclude:default_match_exclude"
server_name:
  type: str
  help: MCP Server 名称
  default: my-mcp-server
server_description:
  type: str
  help: Server 描述
  default: ""
language:
  type: choice
  help: 语言
  choices:
    typescript: TypeScript/Node
    python: Python
  default: typescript
transport:
  type: choice
  help: 传输协议
  choices: [stdio, sse, streamable-http]
  default: stdio
package_manager:
  type: choice
  help: 包管理器
  choices: [npm, pnpm, yarn, bun, uv, poetry]
  default: "{{ 'pnpm' if language == 'typescript' else 'uv' }}"
  when: "{{ language == 'typescript' or language == 'python' }}"
test_runner:
  type: choice
  help: 测试框架
  choices: [vitest, jest, pytest]
  default: "{{ 'vitest' if language == 'typescript' else 'pytest' }}"
  when: "{{ language != 'none' }}"
ci_platform:
  type: choice
  help: CI 平台
  choices: [github, gitlab, none]
  default: github
use_lefthook:
  type: bool
  help: 使用 Lefthook 管理 git hooks（推荐）
  default: false
use_docker:
  type: bool
  help: 添加 Docker 支持（Dockerfile + docker-compose）
  default: false
