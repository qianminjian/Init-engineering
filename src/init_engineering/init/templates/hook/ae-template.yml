_min_ae_version: "1.0.0"
_exclude_callback: "init_engineering.init._shared.exclude:default_match_exclude"
_required_outputs:
  - .gitignore
  - .editorconfig
  - CLAUDE.md
  - README.md
  - LICENSE
  - design/BEACON.md
  - design/INDEX.md
  - .ae-answers.yml
  - .ae-state/init-manifest.json
hook_name:
  type: str
  help: Hook 名称
  default: my-hook
hook_description:
  type: str
  help: Hook 描述
  default: ""
hook_type:
  type: choice
  help: Hook 类型
  choices: [PreToolUse, PostToolUse]
  default: PreToolUse
language:
  type: choice
  help: 主要语言
  choices:
    bash: Bash
    python: Python
    typescript: TypeScript/Node.js
  default: bash
package_manager:
  type: choice
  help: 包管理器（与 language 对应）
  choices: [npm, pnpm, yarn, bun, uv, poetry]
  default: "{{ 'uv' if language == 'python' else 'pnpm' if language == 'typescript' else '' }}"
  when: "{{ language != 'bash' }}"
