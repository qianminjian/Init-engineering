_min_ae_version: "1.0.0"
_exclude_callback: "init_engineering.init._shared.exclude:default_match_exclude"
skill_name:
  type: str
  help: Skill 名称 (kebab-case)
  default: my-skill
skill_description:
  type: str
  help: Skill 描述（用于 AI 触发匹配）
  default: ""
author_name:
  type: str
  help: 作者名
  default: ""
language:
  type: choice
  help: 实现语言
  choices:
    bash: Bash
    python: Python
    typescript: TypeScript
  default: bash
package_manager:
  type: choice
  help: 包管理器（与 language 对应）
  choices: [npm, pnpm, yarn, bun, uv, poetry]
  default: "{{ 'uv' if language == 'python' else 'pnpm' if language == 'typescript' else '' }}"
  when: "{{ language != 'bash' }}"
