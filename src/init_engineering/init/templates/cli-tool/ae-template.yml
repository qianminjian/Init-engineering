_min_ae_version: "1.0.0"
_exclude_callback: "init_engineering.init._shared.exclude:default_match_exclude"
project_name:
  type: str
  help: CLI 工具名称
  default: my-cli
project_description:
  type: str
  help: 工具描述
  default: ""
language:
  type: choice
  help: 主要语言
  choices:
    typescript: TypeScript/Node
    python: Python
    go: Go
    rust: Rust
  default: typescript
package_manager:
  type: choice
  help: 包管理器
  choices: [npm, pnpm, yarn, bun, uv, poetry, cargo]
  default: "{{ 'pnpm' if language == 'typescript' else 'uv' if language == 'python' else 'cargo' if language == 'rust' else '' }}"
  when: "{{ language != 'go' }}"
test_runner:
  type: choice
  help: 测试框架
  choices: [vitest, jest, pytest, "go test", "cargo test"]
  default: "{{ 'vitest' if language == 'typescript' else 'pytest' if language == 'python' else 'go test' if language == 'go' else 'cargo test' }}"
  when: "{{ language != 'none' }}"
ci_platform:
  type: choice
  help: CI 平台
  choices: [github, gitlab, none]
  default: github
use_lefthook:
  type: bool
  help: 使用 Lefthook 管理 git hooks（推荐）
  default: false
use_docker:
  type: bool
  help: 添加 Docker 支持（Dockerfile + docker-compose）
  default: false
