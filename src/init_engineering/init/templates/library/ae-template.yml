_min_ae_version: "1.0.0"
_exclude_callback: "init_engineering.init._shared.exclude:default_match_exclude"
_required_outputs:
  - .gitignore
  - .editorconfig
  - CLAUDE.md
  - README.md
  - LICENSE
  - design/BEACON.md
  - design/INDEX.md
  - .ae-answers.yml
  - .ae-state/init-manifest.json
project_name:
  type: str
  help: 项目名称
  default: my-library
project_description:
  type: str
  help: 项目描述
  default: ""
language:
  type: choice
  help: 主要语言/生态
  choices:
    typescript: TypeScript/Node
    python: Python
    go: Go
    rust: Rust
    java: Java/Maven
  default: typescript
package_manager:
  type: choice
  help: 包管理器
  choices: [npm, pnpm, yarn, bun, uv, poetry, cargo, mvn]
  default: "{{ 'pnpm' if language == 'typescript' else 'uv' if language == 'python' else 'cargo' if language == 'rust' else 'mvn' if language == 'java' else '' }}"
  when: "{{ language != 'go' }}"
test_runner:
  type: choice
  help: 测试框架
  choices: [vitest, jest, pytest, "go test", "cargo test", junit]
  default: "{{ 'vitest' if language == 'typescript' else 'pytest' if language == 'python' else 'go test' if language == 'go' else 'cargo test' if language == 'rust' else 'junit' if language == 'java' else '' }}"
  when: "{{ language != 'none' }}"
use_typescript:
  type: bool
  help: 使用 TypeScript
  default: "{{ language == 'typescript' }}"
  when: "{{ language == 'typescript' }}"
ci_platform:
  type: choice
  help: CI 平台
  choices: [github, gitlab, none]
  default: github
use_lefthook:
  type: bool
  help: 使用 Lefthook 管理 git hooks（推荐）
  default: false
use_docker:
  type: bool
  help: 添加 Docker 支持（Dockerfile + docker-compose）
  default: false
java_version:
  type: str
  help: Java 版本（用于 maven.compiler.source/target）
  default: "21"
  when: "{{ language == 'java' }}"
